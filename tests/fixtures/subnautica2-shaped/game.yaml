gdl: 1
game:
  id: subnautica2-shaped
  name: Subnautica 2 (Shape Test)
  executable: SubnauticaZero.exe
  requiredFiles: [SubnauticaZero.exe]

stores:
  steam: 264710
  epic:  Subnautica2
  xbox:  Unknown.Subnautica2

context:
  paksRoot: !storeBranch
    xbox:    ${installPath}/Content/Paks/~mods
    default: ${installPath}/SubnauticaZero/Content/Paks/~mods
  logicModsRoot: ${installPath}/SubnauticaZero/Content/Paks/LogicMods
  ue4ssModsRoot: ${installPath}/SubnauticaZero/Binaries/Win64/Mods

modTypes:
  - { id: pak,        name: Pak Mod,       path: "${paksRoot}" }
  - { id: logic-mod,  name: LogicMod,      path: "${logicModsRoot}" }
  - { id: ue4ss-lua,  name: UE4SS Lua Mod, path: "${ue4ssModsRoot}" }

installers:
  - id: ue4ss-lua
    priority: 10
    when:    !hasFile "**/Scripts/*.lua"
    anchor:  "**/Scripts/"
    take:    parent
    placeAt: "${ue4ssModsRoot}"
    modType: ue4ss-lua

  - id: logic-mod
    priority: 20
    when:    !hasFile "**/LogicMods/**/*.pak"
    anchor:  "**/LogicMods/"
    take:    self
    placeAt: "${logicModsRoot}"
    modType: logic-mod

  - id: pak
    priority: 30
    when:    !hasFile "**/*.pak"
    anchor:  "**/*.pak"
    take:    parent
    placeAt: "${paksRoot}"
    modType: pak

  - id: composite-mod
    priority: 99
    when: !all
      - !hasFile "**/*.pak"
      - !hasFile "**/Scripts/*.lua"
    route:
      - match:   "**/Scripts/*.lua"
        anchor:  "**/Scripts/"
        take:    parent
        placeAt: "${ue4ssModsRoot}"
        modType: ue4ss-lua
      - match:   "**/*.pak"
        anchor:  "**/*.pak"
        take:    parent
        placeAt: "${paksRoot}"
        modType: pak

discovery:
  version: !hook detectGameVersion

tests:
  corpus: off
  cases:
    - name: ue4ss lua mod
      archive:
        - MyMod/Scripts/main.lua
        - MyMod/Scripts/util.lua
      expect:
        matched: ue4ss-lua
        modType: ue4ss-lua

    - name: logic-mod under LogicMods/
      archive:
        - Pack/LogicMods/BPFolder/X.pak
        - Pack/LogicMods/Y.pak
      expect:
        matched: logic-mod
        modType: logic-mod

    - name: plain pak mod
      archive:
        - Pack/Cool.pak
      expect:
        matched: pak
        modType: pak

    - name: composite — pak + lua picks composite installer
      archive:
        - A/Scripts/main.lua
        - A/Cool.pak
      expect:
        matched: composite-mod

toolbarActions:
  - id: open-ue4ss-settings
    title: Open UE4SS Settings INI
    priority: 200
    target: !openFile "${ue4ssModsRoot}/../UE4SS-settings.ini"

  - id: open-mods-txt
    title: Open UE4SS mods.txt
    priority: 201
    target: !openFile "${ue4ssModsRoot}/mods.txt"

  - id: open-nexus-page
    title: Open Nexus Page
    priority: 202
    target: !openUrl https://www.nexusmods.com/subnautica2
