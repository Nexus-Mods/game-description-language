gdl: 1
game:
  id: subnautica2-shaped
  name: Subnautica 2 (Shape Test)
  executable: SubnauticaZero.exe
  requiredFiles: [SubnauticaZero.exe]

stores:
  steam: 264710
  epic:  Subnautica2
  xbox:  Unknown.Subnautica2

context:
  paksRoot: !storeBranch
    xbox:    ${installPath}/Content/Paks/~mods
    default: ${installPath}/SubnauticaZero/Content/Paks/~mods
  logicModsRoot: ${installPath}/SubnauticaZero/Content/Paks/LogicMods
  ue4ssModsRoot: ${installPath}/SubnauticaZero/Binaries/Win64/Mods
  ue4ssInjectorRoot: !storeBranch
    xbox:    ${installPath}/SubnauticaZero/Binaries/WinGDK
    default: ${installPath}/SubnauticaZero/Binaries/Win64

modTypes:
  - { id: pak,            name: Pak Mod,          path: "${paksRoot}" }
  - { id: logic-mod,      name: LogicMod,         path: "${logicModsRoot}" }
  - { id: ue4ss-lua,      name: UE4SS Lua Mod,    path: "${ue4ssModsRoot}" }
  - { id: ue4ss-injector, name: UE4SS Injector,   path: "${ue4ssInjectorRoot}" }
  - { id: root,           name: Root (game folder), path: "${installPath}" }

installers:
  - id: ue4ss-lua
    priority: 22
    when:    !hasFile "**/Scripts/*.lua"
    anchor:  "**/Scripts/*.lua"
    take:    parent.parent
    placeAt: "${ue4ssModsRoot}"
    modType: ue4ss-lua

  - id: ue4ss-lua-enabled
    priority: 23
    when:    !hasFile "**/enabled.txt"
    unless:  !hasFile "**/Scripts/*.lua"
    anchor:  "**/enabled.txt"
    take:    parent.parent
    placeAt: "${ue4ssModsRoot}"
    modType: ue4ss-lua

  - id: logic-mod
    priority: 20
    when:    !hasFile "**/LogicMods/**/*.pak"
    anchor:  "**/LogicMods/"
    take:    self
    placeAt: "${logicModsRoot}"
    modType: logic-mod

  - id: pak
    priority: 30
    when:    !hasFile "**/*.pak"
    unless: !any
      - !hasFile "**/LogicMods/**"
      - !hasFile "**/Scripts/*.lua"
    anchor:  "**/*.pak"
    take:    parent
    placeAt: "${paksRoot}"
    modType: pak

  - id: ue4ss-injector
    priority: 15
    when:    !hasFile "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}"
    anchor:  "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}"
    take:    parent
    placeAt: "${ue4ssInjectorRoot}"
    modType: ue4ss-injector

  - id: composite-mod
    priority: 99
    when: !all
      - !hasFile "**/*.pak"
      - !hasFile "**/Scripts/*.lua"
    route:
      - match:   "**/Scripts/*.lua"
        anchor:  "**/Scripts/"
        take:    parent
        placeAt: "${ue4ssModsRoot}"
        modType: ue4ss-lua
      - match:   "**/*.pak"
        anchor:  "**/*.pak"
        take:    parent
        placeAt: "${paksRoot}"
        modType: pak

  - id: root
    priority: 24
    when: !any
      - !hasFile "**/Subnautica2/**"
      - !hasFile "**/Engine/**"
      - !hasFile "**/Binaries/**"
    unless: !any
      - !hasFile "**/LogicMods/**"
      - !hasFile "**/Scripts/*.lua"
      - !hasFile "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}"
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: root

discovery:
  version: !hook detectGameVersion

tests:
  corpus: off
  cases:
    - name: ue4ss lua mod
      archive:
        - MyMod/Scripts/main.lua
        - MyMod/Scripts/util.lua
      expect:
        matched: ue4ss-lua
        modType: ue4ss-lua

    - name: logic-mod under LogicMods/
      archive:
        - Pack/LogicMods/BPFolder/X.pak
        - Pack/LogicMods/Y.pak
      expect:
        matched: logic-mod
        modType: logic-mod

    - name: plain pak mod
      archive:
        - Pack/Cool.pak
      expect:
        matched: pak
        modType: pak

    - name: composite — pak + lua picks composite installer
      archive:
        - A/Scripts/main.lua
        - A/Cool.pak
      expect:
        matched: composite-mod

    - name: pak archive with LogicMods present routes to logic-mod (not pak)
      archive:
        - Outer/LogicMods/Inner/X.pak
      expect:
        matched: logic-mod
        modType: logic-mod

    - name: pak archive with Scripts present routes to ue4ss-lua (not pak)
      archive:
        - Outer/Cool.pak
        - Outer/Scripts/main.lua
      expect:
        matched: ue4ss-lua

    - name: ue4ss injector — single marker at archive root
      archive:
        - dwmapi.dll
        - ue4ss/settings.ini
      expect:
        matched: ue4ss-injector
        modType: ue4ss-injector

    - name: ue4ss injector — marker in a subfolder; sibling files dropped
      archive:
        - Pack/inject/dwmapi.dll
        - Pack/inject/ue4ss/x.lua
        - Pack/Readme.md
      expect:
        matched: ue4ss-injector
        modType: ue4ss-injector
        plan:
          - ${ue4ssInjectorRoot}/dwmapi.dll
          - ${ue4ssInjectorRoot}/ue4ss/x.lua

    - name: ue4ss injector — case-insensitive marker match
      archive:
        - Pack/Inject/DWMAPI.DLL
      expect:
        matched: ue4ss-injector
        modType: ue4ss-injector

    - name: enabled.txt-only ue4ss mod preserves mod-name in destination
      archive:
        - MyLuaMod/enabled.txt
        - MyLuaMod/data.json
      expect:
        matched: ue4ss-lua-enabled
        modType: ue4ss-lua
        plan:
          - ${ue4ssModsRoot}/MyLuaMod/enabled.txt
          - ${ue4ssModsRoot}/MyLuaMod/data.json

    - name: ue4ss lua with Scripts preserves mod-name in destination
      archive:
        - MyLuaMod/Scripts/main.lua
        - MyLuaMod/Scripts/util.lua
      expect:
        matched: ue4ss-lua
        plan:
          - ${ue4ssModsRoot}/MyLuaMod/Scripts/main.lua
          - ${ue4ssModsRoot}/MyLuaMod/Scripts/util.lua

    - name: root installer takes whole game-folder archives as-is
      archive:
        - Subnautica2/Content/Paks/foo.pak
        - Engine/Content/bar.uasset
      expect:
        matched: root
        modType: root
        plan:
          - ${installPath}/Subnautica2/Content/Paks/foo.pak
          - ${installPath}/Engine/Content/bar.uasset

toolbarActions:
  - id: open-ue4ss-settings
    title: Open UE4SS Settings INI
    priority: 200
    target: !openFile "${ue4ssModsRoot}/../UE4SS-settings.ini"

  - id: open-mods-txt
    title: Open UE4SS mods.txt
    priority: 201
    target: !openFile "${ue4ssModsRoot}/mods.txt"

  - id: open-nexus-page
    title: Open Nexus Page
    priority: 202
    target: !openUrl https://www.nexusmods.com/subnautica2
