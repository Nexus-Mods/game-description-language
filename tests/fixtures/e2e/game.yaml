gdl: 1
game:
  id: helloworld
  name: Hello World
  executable: HelloWorld.exe
  requiredFiles: [HelloWorld.exe]
stores:
  steam: 264710
context:
  modsRoot: ${installPath}/Mods
  paksRoot: ${modsRoot}/Paks
modTypes:
  - { id: pak, name: Pak Mod, path: "${paksRoot}" }
installers:
  - id: pak
    priority: 10
    when: !hasFile "**/*.pak"
    anchor: "**/*.pak"
    take: parent
    placeAt: "${paksRoot}"
    modType: pak
tests:
  corpus: off
  cases:
    - name: typical pak mod
      archive: [MyMod/CoolPak.pak, MyMod/Readme.md]
      expect:
        matched: pak
        plan:
          - /games/Hello/Mods/Paks/CoolPak.pak
          - /games/Hello/Mods/Paks/Readme.md

nexus:
  modId: 1234
  fileGroupId: 5678
  displayName: Hello World Support for Vortex
